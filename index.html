<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FlowScan 8</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07080a;--s1:#0d0f14;--s2:#12151c;--s3:#181c26;--bdr:#1d2235;--grn:#0dff8c;--red:#ff3d5a;--yel:#ffcc00;--blu:#4d9fff;--txt:#dde2f0;--m1:#4a5270;--m2:#6b748f}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;min-height:100vh}
.w{max-width:820px;margin:0 auto;padding:16px 14px 80px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid var(--bdr);margin-bottom:20px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.06em;line-height:1}
.logo .g{color:var(--grn)}.logo .y{color:var(--yel)}
.logo-s{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--m2);margin-top:3px;letter-spacing:.1em}
.hdr-r{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--m2);text-align:right;line-height:1.9}
.hdr-r b{color:var(--grn)}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--m1);margin-right:4px;vertical-align:middle;transition:all .3s}
.sdot.live{background:var(--grn);box-shadow:0 0 6px var(--grn)}
.tabs{display:flex;margin-bottom:20px;border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.tab{flex:1;padding:14px 10px;text-align:center;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.06em;color:var(--m2);background:var(--s1);transition:all .2s;border:none;line-height:1.3}
.tab:first-child{border-right:1px solid var(--bdr)}
.tab.active{background:var(--s2);color:var(--grn)}
.tab-sub{font-family:'Barlow',sans-serif;font-size:.6rem;font-weight:400;letter-spacing:.01em;display:block;margin-top:2px;opacity:.7}
.panel{display:none}.panel.active{display:block}
.box{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:16px;margin-bottom:14px}
.pt{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--grn);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.pt::after{content:'';flex:1;height:1px;background:var(--bdr)}
.row{display:flex;gap:8px;flex-wrap:wrap}
.fi{flex:1;min-width:110px}
.fi label{display:block;font-size:.55rem;color:var(--m2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-family:'IBM Plex Mono',monospace}
.fi input,.fi select{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:.72rem;padding:7px 9px;outline:none;transition:border-color .2s}
.fi input:focus,.fi select:focus{border-color:var(--grn)}
.tgrid{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.tchip{font-family:'IBM Plex Mono',monospace;font-size:.6rem;padding:4px 9px;border-radius:4px;cursor:pointer;background:var(--s2);border:1px solid var(--bdr);color:var(--m2);transition:all .2s;user-select:none}
.tchip.on{background:rgba(13,255,140,.1);border-color:rgba(13,255,140,.4);color:var(--grn)}
textarea{width:100%;min-height:120px;background:var(--bg);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:.68rem;padding:10px;resize:vertical;outline:none;line-height:1.6;transition:border-color .2s}
textarea:focus{border-color:var(--grn)}
textarea::placeholder{color:var(--m1)}
.btn-g{width:100%;margin-top:14px;padding:16px;background:linear-gradient(135deg,rgba(13,255,140,.12),rgba(13,255,140,.06));color:var(--grn);border:2px solid rgba(13,255,140,.4);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.1em;cursor:pointer;transition:all .2s}
.btn-g:hover{background:linear-gradient(135deg,rgba(13,255,140,.2),rgba(13,255,140,.1));border-color:var(--grn);box-shadow:0 0 20px rgba(13,255,140,.2)}
.btn-g:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}
.btn-b{width:100%;margin-top:12px;padding:13px;background:var(--s2);color:var(--blu);border:1px solid rgba(77,159,255,.3);border-radius:7px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;cursor:pointer;transition:all .2s}
.btn-b:hover{background:rgba(77,159,255,.08);border-color:var(--blu)}
.btn-b:disabled{opacity:.3;cursor:not-allowed}
.pg{display:none;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.pg.on{display:block}
.pg-top{display:flex;justify-content:space-between;margin-bottom:10px}
.pg-lbl{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--grn)}
.pg-cnt{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--m2)}
.pg-bg{height:4px;background:var(--bdr);border-radius:4px;overflow:hidden}
.pg-fill{height:100%;background:var(--grn);border-radius:4px;transition:width .4s;box-shadow:0 0 8px var(--grn);width:0%}
.pg-sub{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--m2);margin-top:7px}
.pg-sub b{color:var(--txt)}
.er{display:none;background:rgba(255,61,90,.08);border:1px solid rgba(255,61,90,.3);border-radius:8px;padding:11px 13px;font-size:.72rem;color:var(--red);margin-bottom:12px;font-family:'IBM Plex Mono',monospace}
.er.on{display:block}
#res{display:none}
#res.on{display:block}
.exec{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:16px}
.ex-hdr{background:linear-gradient(135deg,#0d1520,#0a1018);border-bottom:1px solid var(--bdr);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.ex-title{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.08em;color:var(--grn)}
.ex-date{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--m2)}
.ex-body{padding:14px 16px}
.verd{background:var(--s2);border-left:3px solid var(--grn);border-radius:0 7px 7px 0;padding:11px 13px;margin-bottom:12px;font-size:.8rem;line-height:1.6}
.verd.bear{border-color:var(--red)}.verd.mix{border-color:var(--yel)}
.estats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
.es{background:var(--s2);border:1px solid var(--bdr);border-radius:6px;padding:9px 8px;text-align:center}
.es-n{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;line-height:1}
.es-l{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--m2);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{font-family:'Bebas Neue',sans-serif;font-size:.88rem;padding:4px 11px;border-radius:5px;cursor:pointer;border:1px solid;transition:all .2s}
.chip.c{background:rgba(13,255,140,.08);color:var(--grn);border-color:rgba(13,255,140,.25)}.chip.c:hover{background:rgba(13,255,140,.18)}
.chip.p{background:rgba(255,61,90,.08);color:var(--red);border-color:rgba(255,61,90,.25)}.chip.p:hover{background:rgba(255,61,90,.18)}
.stit{font-family:'IBM Plex Mono',monospace;font-size:.56rem;color:var(--m2);letter-spacing:.1em;text-transform:uppercase;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.stit::after{content:'';flex:1;height:1px;background:var(--bdr)}
.cards{display:flex;flex-direction:column;gap:11px}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;animation:fi .3s ease both}
.card.call{border-color:rgba(13,255,140,.2)}.card.put{border-color:rgba(255,61,90,.2)}.card.skip{opacity:.4}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.15}}
.acbanner{padding:10px 15px;font-family:'IBM Plex Mono',monospace;font-size:.65rem;font-weight:700;letter-spacing:.02em;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.acg{background:rgba(13,255,140,.1);color:var(--grn)}.acg .dot{background:var(--grn);box-shadow:0 0 6px var(--grn)}
.acy{background:rgba(255,204,0,.08);color:var(--yel)}.acy .dot{background:var(--yel)}
.acr{background:rgba(255,61,90,.07);color:var(--red)}.acr .dot{background:var(--red)}
.ct{display:flex;align-items:stretch;border-bottom:1px solid var(--bdr)}
.cb{width:3px;flex-shrink:0}
.card.call .cb{background:var(--grn)}.card.put .cb{background:var(--red)}
.cm{flex:1;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.tkr{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tk{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:.04em;line-height:1}
.card.call .tk{color:var(--grn)}.card.put .tk{color:var(--red)}
.tp{font-family:'IBM Plex Mono',monospace;font-size:.52rem;font-weight:700;padding:2px 6px;border-radius:3px}
.call .tp{background:rgba(13,255,140,.12);color:var(--grn)}.put .tp{background:rgba(255,61,90,.12);color:var(--red)}
.sc-pill{font-family:'IBM Plex Mono',monospace;font-size:.52rem;padding:2px 7px;border-radius:3px;font-weight:700}
.csub{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--m2);margin-top:3px}
.ring{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;border:2px solid;flex-shrink:0}
.rh{border-color:var(--grn);color:var(--grn);background:rgba(13,255,140,.07)}
.rm{border-color:var(--yel);color:var(--yel);background:rgba(255,204,0,.07)}
.rl{border-color:var(--m1);color:var(--m1)}
.sbars{padding:6px 0;background:var(--s2);border-bottom:1px solid var(--bdr)}
.sbar{display:flex;align-items:center;gap:8px;padding:3px 14px}
.sbar-lbl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:var(--m2);min-width:105px}
.sbar-bg{flex:1;height:5px;background:var(--bdr);border-radius:4px;overflow:hidden}
.sbar-fill{height:100%;border-radius:4px}
.sbar-val{font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:700;min-width:26px;text-align:right}
.dg{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bdr);border-bottom:1px solid var(--bdr)}
@media(max-width:430px){.dg{grid-template-columns:repeat(2,1fr)}}
.dc{background:var(--s1);padding:8px 11px}.dc:first-child{padding-left:15px}.dc.full{grid-column:1/-1}
.dl{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--m1);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.dv{font-size:.8rem;font-weight:600}
.dv.g{color:var(--grn)}.dv.r{color:var(--red)}.dv.y{color:var(--yel)}.dv.b{color:var(--blu)}
.ab{padding:11px 12px 11px 15px}
.as{margin-bottom:9px}.as:last-child{margin-bottom:0}
.al{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:var(--m2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.at{font-size:.76rem;line-height:1.6;color:#8a93ad}
.ent{display:flex;background:var(--s2);border-top:1px solid var(--bdr);flex-wrap:wrap}
.ei{flex:1;min-width:110px;padding:9px 11px;border-right:1px solid var(--bdr)}
.ei:first-child{padding-left:15px}.ei:last-child{border-right:none}
.el{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--m1);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.ev{font-size:.82rem;font-weight:700;color:var(--yel)}
.exp-btn{display:block;width:100%;margin-top:20px;margin-bottom:10px;padding:14px;background:rgba(255,204,0,.07);color:var(--yel);border:2px solid rgba(255,204,0,.4);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.1em;cursor:pointer;transition:all .2s;text-align:center}
.exp-btn:hover{background:rgba(255,204,0,.13);border-color:var(--yel)}
.disc{margin-top:10px;padding:11px 13px;background:var(--s1);border:1px solid var(--bdr);border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--m1);line-height:1.7}
.disc b{color:var(--yel)}
.pdf-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:99999;overflow-y:auto;padding:60px 20px 20px;font-family:Arial,sans-serif;font-size:11px;color:#111}
.pdf-btns{position:fixed;top:0;left:0;right:0;background:#fff;padding:10px 16px;display:flex;gap:8px;border-bottom:1px solid #ddd;z-index:100000}
@media print{.pdf-btns{display:none!important}.pdf-ov{padding-top:10px!important;position:static!important}}
</style>
</head>
<body>
<div class="w">

<div class="hdr">
  <div>
    <div class="logo">FLOW<span class="g">SCAN</span> <span class="y">8</span></div>
    <div class="logo-s">UNUSUAL OPTIONS · POLYGON.IO · IBKR</div>
  </div>
  <div class="hdr-r">
    <span class="sdot" id="sdot"></span><span id="sstat">Conectando...</span><br>
    Capital: <b>$500-$1,500</b> · IBKR
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-btn-scan" onclick="showTab('scan',this)">
    🔍 SCAN AUTONOMO
    <span class="tab-sub">Polygon busca flujo inusual real</span>
  </button>
  <button class="tab" id="tab-btn-manual" onclick="showTab('manual',this)">
    📋 MIS ALERTAS
    <span class="tab-sub">Pega alertas de tu grupo</span>
  </button>
</div>

<!-- SCAN TAB -->
<div class="panel active" id="panel-scan">
  <div class="box">
    <div class="pt">Configuracion</div>
    <div class="row">
      <div class="fi"><label>Capital min ($)</label><input type="number" id="cmin" value="500"></div>
      <div class="fi"><label>Capital max ($)</label><input type="number" id="cmax" value="1500"></div>
      <div class="fi">
        <label>Mercado hoy</label>
        <select id="mkt">
          <option value="bullish">Alcista 📈</option>
          <option value="bearish">Bajista 📉</option>
          <option value="neutral" selected>Neutral / Mixto</option>
          <option value="volatile">Muy volatil ⚡</option>
        </select>
      </div>
    </div>
    <div style="margin-top:12px">
      <label style="display:block;font-size:.55rem;color:var(--m2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-family:'IBM Plex Mono',monospace">Tickers a escanear — click para seleccionar/deseleccionar</label>
      <div class="tgrid" id="tgrid"></div>
    </div>
    <button class="btn-g" id="scan-btn" onclick="runScan()">🔍 ESCANEAR FLUJO INUSUAL EN TIEMPO REAL</button>
  </div>
</div>

<!-- MANUAL TAB -->
<div class="panel" id="panel-manual">
  <div class="box">
    <div class="pt">Pega alertas o escribe tickers</div>
    <textarea id="inp" placeholder="Alertas de tu grupo (una por linea):
RCL 1.8 millones calls vencen 15 mayo strike 310 (279 zona interes)
GE 825 mil calls vencen 18 junio strike 330

Solo tickers separados por coma:
AMD, NVDA, AAPL

Comentario con >> en la linea siguiente:
ADBE 530 mil calls ene 2027 strike 300
>> ADBE anuncio buyback $25B esta semana"></textarea>
    <div class="row" style="margin-top:10px">
      <div class="fi"><label>Capital min ($)</label><input type="number" id="cmin2" value="500"></div>
      <div class="fi"><label>Capital max ($)</label><input type="number" id="cmax2" value="1500"></div>
      <div class="fi">
        <label>Mercado</label>
        <select id="mkt2">
          <option value="bullish">Alcista 📈</option>
          <option value="bearish">Bajista 📉</option>
          <option value="neutral" selected>Neutral / Mixto</option>
          <option value="volatile">Muy volatil ⚡</option>
        </select>
      </div>
    </div>
    <button class="btn-b" id="manual-btn" onclick="runManual()">⚡ ANALIZAR MIS ALERTAS</button>
  </div>
</div>

<div class="er" id="er"></div>
<div class="pg" id="pg">
  <div class="pg-top"><div class="pg-lbl" id="pg-lbl">Iniciando...</div><div class="pg-cnt" id="pg-cnt"></div></div>
  <div class="pg-bg"><div class="pg-fill" id="pg-fill"></div></div>
  <div class="pg-sub" id="pg-sub"></div>
</div>
<div id="res"></div>
</div>

<script>
var BASE = 'https://flow-mac.onrender.com';
var results = [];
var busy = false;
var ALL_TK = ['NVDA','AMD','TSLA','AAPL','META','MSFT','GOOGL','AMZN','SPY','QQQ','MRVL','SMCI','PLTR','CRWD','RBLX','HOOD','GE','BA','COIN','USAR'];
var selTK  = ['NVDA','AMD','TSLA','AAPL','META','MSFT'];

window.onload = function() { checkHealth(); buildGrid(); };

function buildGrid() {
  var g = document.getElementById('tgrid');
  ALL_TK.forEach(function(tk) {
    var c = document.createElement('span');
    c.className = 'tchip' + (selTK.indexOf(tk) >= 0 ? ' on' : '');
    c.textContent = tk;
    c.onclick = function() {
      var i = selTK.indexOf(tk);
      if (i >= 0) { selTK.splice(i,1); c.classList.remove('on'); }
      else { selTK.push(tk); c.classList.add('on'); }
    };
    g.appendChild(c);
  });
}

function checkHealth() {
  fetch(BASE + '/api/health')
    .then(function(r){return r.json();})
    .then(function(d){
      if (d.ok) {
        document.getElementById('sdot').className = 'sdot live';
        document.getElementById('sstat').textContent = 'Backend live · Polygon ' + (d.polygon_key==='configurada'?'✓':'✗');
        document.getElementById('sstat').style.color = 'var(--grn)';
      }
    })
    .catch(function(){
      document.getElementById('sstat').textContent = 'Backend offline';
      document.getElementById('sstat').style.color = 'var(--red)';
    });
}

function showTab(name, btn) {
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('res').className='';
  document.getElementById('res').innerHTML='';
  document.getElementById('er').className='er';
}

function setOff(on){
  document.getElementById('scan-btn').disabled=on;
  document.getElementById('manual-btn').disabled=on;
}
function showErr(msg){
  var e=document.getElementById('er');e.textContent=msg;e.className='er on';setOff(false);busy=false;
}
function prog(pct,lbl,sub){
  document.getElementById('pg-fill').style.width=pct+'%';
  document.getElementById('pg-lbl').textContent=lbl;
  if(sub!==undefined) document.getElementById('pg-sub').innerHTML='<b>'+pct+'%</b> — '+sub;
}

/* ── SCAN via backend ── */
function runScan(){
  if(busy)return;
  if(!selTK.length){showErr('Selecciona al menos un ticker.');return;}
  busy=true;results=[];setOff(true);
  document.getElementById('er').className='er';
  document.getElementById('res').className='on';
  document.getElementById('res').innerHTML='';
  document.getElementById('pg').className='pg on';
  prog(10,'Consultando Polygon.io...','Buscando flujo inusual en tiempo real...');

  var mkt=document.getElementById('mkt').value;
  var url=BASE+'/api/flow?tickers='+selTK.join(',')+'&market='+mkt+'&min_vol_oi=2&min_premium=100000';

  fetch(url)
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){
      prog(100,'Listo',d.items.length+' alertas analizadas');
      document.getElementById('pg').className='pg';
      results=d.items||[];
      if(!results.length){
        document.getElementById('res').innerHTML='<div style="background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:24px;text-align:center;font-family:\'IBM Plex Mono\',monospace;font-size:.8rem;color:var(--m2)">Sin flujo inusual detectado hoy para los tickers seleccionados.<br><span style="font-size:.65rem;margin-top:8px;display:block">El mercado puede estar cerrado o sin actividad inusual.</span></div>';
        busy=false;setOff(false);return;
      }
      renderFromBackend(results,d.summary,d.source,d.market_mode);
    })
    .catch(function(e){
      document.getElementById('pg').className='pg';
      showErr('Error conectando al backend: '+e.message+'. Verifica que flow-mac.onrender.com este activo (puede tardar 30s en despertar).');
    })
    .finally(function(){busy=false;setOff(false);});
}

/* ── MANUAL via AI ── */
function runManual(){
  if(busy)return;
  var raw=(document.getElementById('inp').value||'').trim();
  if(!raw){showErr('Escribe al menos un ticker o una alerta.');return;}
  var items=parseAlerts(raw);
  if(!items.length){showErr('No encontre tickers validos.');return;}
  var cmin=document.getElementById('cmin2').value||'500';
  var cmax=document.getElementById('cmax2').value||'1500';

    sk.id='sk'+i;
    sk.innerHTML='<div style="width:8px;height:8px;border-radius:50%;background:var(--grn);animation:bk 1s ease infinite;flex-shrink:0"></div><div style="font-family:\'IBM Plex Mono\',monospace;font-size:.62rem;color:var(--m2)">Analizando <b style="color:var(--txt)">'+it.ticker+'</b>...</div>';
    cardsDiv.appendChild(sk);
  });
  var done=0;
  function analyzeOne(item,i,attempt){
    attempt=attempt||1;
    var mktTxt={bullish:'alcista',bearish:'bajista',neutral:'neutral/mixto',volatile:'muy volatil'}[mkt];
    var ctx=item.simple?'Sin alerta especifica. Analiza datos actuales.':'Alerta: '+item.raw;
    var cmt=item.comment?'\nInfo adicional: '+item.comment:'';
    var msg='Analiza '+item.ticker+' para opciones. BUSCA EN INTERNET: precio actual, volumen vs promedio 20d, %vs MA5/MA20/MA50, noticias 7d, short interest, sector.\n'+ctx+cmt+'\nMercado: '+mktTxt+'. Capital: $'+cmin+'-$'+cmax+' IBKR.\n\n'
      +'SCORING OBLIGATORIO (max 10.0):\nV1 Catalizador(max3.0): earnings/M&A=3.0|upgrade=2.5|noticia=1.5|nada=0.0\nV2 Flujo(max2.5): >5M=2.5|2-5M=2.0|1-2M=1.5|<1M=0.5\nV3 Momentum(max2.0): sobreMA20+MA50+vol>150%=2.0|sobreMA50=1.2|lateral=0.6|bajo=0.0\nV4 Sector(max1.5): alcista=1.5|neutral=0.8|cae=0.0\nV5 Short(max1.0): >20%=1.0|10-20%=0.6|<10%=0.2\nVERDE>=7|AMARILLO>=4|ROJO<4\n\n'
      +'Responde SOLO JSON:\n{"ticker":"X","type":"CALL","score":7.5,"semaforo":"VERDE","pts_catalyst":2.5,"pts_flow":2.0,"pts_momentum":1.5,"pts_sector":1.0,"pts_short":0.5,"score_breakdown":"Cat 2.5+Flujo 2.0+Mom 1.5+Sec 1.0+Short 0.5=7.5","strike":100,"expiry":"jun 2025","flow_usd":"$1.8M","price":"$95","vol_vs_avg":"185%","ma5_pct":"+6%","ma20_pct":"+11%","ma50_pct":"+18%","momentum":"ALCISTA","rsi":"Normal 55","short_interest":"12%","sector_context":"sector alcista","news":"noticia o ninguna","sentiment":"POSITIVO","control":"COMPRADORES 71%","control_detail":"OBV al alza","why":"razon en 2 oraciones","risk":"riesgo en 1 oracion","catalyst":"evento o ninguno","ez":"$90-92","pm":"$120-200","c5":3,"c15":9,"sl":"$85"}';
    fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1400,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:msg}]})})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(data){
      var txt=(data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
      var a=txt.indexOf('{'),b=txt.lastIndexOf('}');
      if(a===-1||b===-1)throw new Error('Sin JSON');
      var d=JSON.parse(txt.substring(a,b+1));
      d._comment=item.comment||'';
      results.push(d);
      var card=buildCard(d,i);
      var sk=document.getElementById('sk'+i);if(sk)sk.replaceWith(card);
      done++;prog(Math.round(done/items.length*100),done+'/'+items.length+' completados',done<items.length?'Analizando...':'Generando resumen...');
      if(done>=items.length)finishManual();
    })
    .catch(function(e){
      var m=e.message||'';
      if(m.includes('429')&&attempt<4){
        var w=attempt*5000;
        var sk2=document.getElementById('sk'+i);
        if(sk2)sk2.querySelector('div:last-child').innerHTML='Reintentando <b style="color:var(--yel)">'+item.ticker+'</b> en '+(w/1000)+'s...';

        if(done>=items.length)finishManual();
      }
    });
  }
  items.forEach(function(it,i){setTimeout(function(){analyzeOne(it,i,1);},i*500);});
}

function parseAlerts(raw){
  var out=[],seen={};
  raw.replace(/\r/g,'').split('\n').forEach(function(line){
    line=line.trim();if(!line)return;
    if(line.startsWith('>>')||line.startsWith('//')||line.startsWith('#')){var n=line.replace(/^(>>|\/\/|#)+\s*/,'').trim();if(n&&out.length)out[out.length-1].comment=(out[out.length-1].comment?out[out.length-1].comment+' | ':'')+n;return;}
    if(/^[A-Za-z]{1,6}(\s*,\s*[A-Za-z]{1,6})+\s*$/.test(line)){line.split(',').forEach(function(t){var tk=t.trim().toUpperCase();if(tk&&!seen[tk]){seen[tk]=1;out.push({ticker:tk,raw:tk,simple:true,comment:''});}});return;}
    if(/^[A-Za-z]{1,6}$/.test(line)){var tk=line.toUpperCase();if(!seen[tk]){seen[tk]=1;out.push({ticker:tk,raw:tk,simple:true,comment:''});}return;}
    var m=line.match(/([A-Z]{1,6})\b/);if(m&&!seen[m[1]]){seen[m[1]]=1;out.push({ticker:m[1],raw:line,simple:false,comment:''});}
  });
  if(!out.length){raw.split(',').forEach(function(p){var m=p.trim().toUpperCase().match(/^([A-Z]{1,6})/);if(m&&!seen[m[1]]){seen[m[1]]=1;out.push({ticker:m[1],raw:p.trim(),simple:true,comment:''});}});}
  return out;
}

  var vc=bias==='BAJISTA'?'bear':bias==='MIXTO'?'mix':'';

    var pc2=document.createElement('div');pc2.style.cssText='border:1px solid #ccc;border-radius:6px;margin-bottom:12px;overflow:hidden;page-break-inside:avoid';
    pc2.innerHTML='<div style="padding:8px 12px;display:flex;justify-content:space-between;align-items:center;background:'+(call?'#e8fff5':'#fff0f2')+';border-bottom:2px solid '+(call?'#00c46a':'#e53935')+'"><div><span style="font-size:15px;font-weight:700;color:'+(call?'#00873d':'#c62828')+'">'+d.ticker+'</span> · '+(d.direction||d.type)+' · Strike $'+(d.strike||'N/A')+' · '+(d.expiry||'N/A')+'<br><span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;background:'+ab+';color:'+ac+'">'+at+'</span></div><span style="font-size:20px;font-weight:700;color:'+(sc>=7?'#00873d':sc>=4?'#e65100':'#c62828')+'">'+sc+'/10</span></div>'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid #eee"><div style="padding:6px 10px;border-right:1px solid #eee"><div style="font-size:8px;color:#888;text-transform:uppercase">Precio</div><div style="font-size:11px;font-weight:600">'+(d.price||d.spot||'N/A')+'</div></div><div style="padding:6px 10px;border-right:1px solid #eee"><div style="font-size:8px;color:#888;text-transform:uppercase">vs MA50</div><div style="font-size:11px;font-weight:600">'+(d.ma50_pct||'N/A')+'</div></div><div style="padding:6px 10px"><div style="font-size:8px;color:#888;text-transform:uppercase">Momentum</div><div style="font-size:11px;font-weight:600">'+(d.momentum||'N/A')+'</div></div></div>'
      +'<div style="padding:8px 12px;border-top:1px solid #eee"><div style="font-size:8px;color:#888;text-transform:uppercase;margin-bottom:2px">Analisis</div><div style="font-size:10px;color:#333;line-height:1.5">'+(d.why||'N/A')+'</div><div style="font-size:8px;color:#888;text-transform:uppercase;margin:5px 0 2px">Riesgo</div><div style="font-size:10px;color:#333">'+(d.risk||(d.stop?'Stop: '+d.stop:'N/A'))+'</div></div>';
    ov.appendChild(pc2);
  });
  var disc=document.createElement('div');disc.style.cssText='margin-top:16px;padding:10px;border:1px solid #ffc107;background:#fff9e6;border-radius:4px;font-size:9px;color:#666';disc.innerHTML='<b>AVISO:</b> No es asesoria financiera. Verifica en IBKR.';ov.appendChild(disc);
  document.body.appendChild(ov);
}
