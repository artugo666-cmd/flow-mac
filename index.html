<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FlowScan 9</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07080a;--s1:#0d0f14;--s2:#12151c;--bdr:#1d2235;--grn:#0dff8c;--red:#ff3d5a;--yel:#ffcc00;--blu:#4d9fff;--txt:#dde2f0;--m1:#4a5270;--m2:#6b748f}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;min-height:100vh}
.w{max-width:860px;margin:0 auto;padding:14px 12px 80px}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--bdr);margin-bottom:16px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:.06em}
.logo .g{color:var(--grn)}.logo .y{color:var(--yel)}
.logo-s{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:var(--m2);letter-spacing:.1em;margin-top:2px}
.hdr-r{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--m2);line-height:1.8}
.hdr-r b{color:var(--grn)}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--m1);margin-right:4px;vertical-align:middle}
.sdot.live{background:var(--grn);box-shadow:0 0 6px var(--grn)}

/* MARKET PULSE */
.pulse{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:14px;display:none}
.pulse.on{display:block}
.pulse-hdr{background:var(--s2);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.pulse-title{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.08em}
.pulse-vix{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--m2)}
.pulse-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bdr)}
.pulse-cell{background:var(--s1);padding:10px 12px}
.pulse-lbl{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--m1);margin-bottom:3px;text-transform:uppercase}
.pulse-val{font-size:.9rem;font-weight:700}
.pulse-chg{font-size:.7rem;margin-top:2px}

/* TABS */
.tabs{display:flex;margin-bottom:14px;border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.tab{flex:1;padding:12px 8px;text-align:center;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.06em;color:var(--m2);background:var(--s1);border:none;transition:all .2s;line-height:1.3}
.tab:first-child{border-right:1px solid var(--bdr)}
.tab.active{background:var(--s2);color:var(--grn)}
.tab-sub{font-family:'Barlow',sans-serif;font-size:.58rem;font-weight:400;display:block;margin-top:2px;opacity:.7}
.panel{display:none}.panel.active{display:block}

/* CONFIG BOX */
.box{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:12px}
.pt{font-family:'IBM Plex Mono',monospace;font-size:.56rem;color:var(--grn);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.pt::after{content:'';flex:1;height:1px;background:var(--bdr)}
.row{display:flex;gap:8px;flex-wrap:wrap}
.fi{flex:1;min-width:100px}
.fi label{display:block;font-size:.53rem;color:var(--m2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-family:'IBM Plex Mono',monospace}
.fi input,.fi select{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:.7rem;padding:7px 9px;outline:none;transition:border-color .2s}
.fi input:focus,.fi select:focus{border-color:var(--grn)}
.tgrid{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.tchip{font-family:'IBM Plex Mono',monospace;font-size:.58rem;padding:3px 8px;border-radius:4px;cursor:pointer;background:var(--s2);border:1px solid var(--bdr);color:var(--m2);transition:all .2s;user-select:none}
.tchip.on{background:rgba(13,255,140,.1);border-color:rgba(13,255,140,.4);color:var(--grn)}
textarea{width:100%;min-height:100px;background:var(--bg);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:.66rem;padding:10px;resize:vertical;outline:none;line-height:1.6;transition:border-color .2s}
textarea:focus{border-color:var(--grn)}
textarea::placeholder{color:var(--m1)}

/* BUTTONS */
.btn-scan{width:100%;margin-top:12px;padding:15px;background:linear-gradient(135deg,rgba(13,255,140,.15),rgba(13,255,140,.07));color:var(--grn);border:2px solid rgba(13,255,140,.5);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.1em;cursor:pointer;transition:all .2s}
.btn-scan:hover{border-color:var(--grn);box-shadow:0 0 20px rgba(13,255,140,.2)}
.btn-scan:disabled{opacity:.3;cursor:not-allowed}
.btn-alert{width:100%;margin-top:10px;padding:13px;background:var(--s2);color:var(--blu);border:1px solid rgba(77,159,255,.35);border-radius:7px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;cursor:pointer;transition:all .2s}
.btn-alert:hover{background:rgba(77,159,255,.08);border-color:var(--blu)}
.btn-alert:disabled{opacity:.3;cursor:not-allowed}

/* PROGRESS */
.pg{display:none;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.pg.on{display:block}
.pg-top{display:flex;justify-content:space-between;margin-bottom:8px}
.pg-lbl{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--grn)}
.pg-bg{height:3px;background:var(--bdr);border-radius:3px;overflow:hidden}
.pg-fill{height:100%;background:var(--grn);border-radius:3px;transition:width .4s;box-shadow:0 0 6px var(--grn);width:0%}
.pg-sub{font-family:'IBM Plex Mono',monospace;font-size:.56rem;color:var(--m2);margin-top:6px}

/* ERROR */
.er{display:none;background:rgba(255,61,90,.08);border:1px solid rgba(255,61,90,.3);border-radius:8px;padding:10px 12px;font-size:.7rem;color:var(--red);margin-bottom:12px;font-family:'IBM Plex Mono',monospace}
.er.on{display:block}

/* RESULTS */
#res{display:none}#res.on{display:block}

/* SUMMARY BOX */
.sumbox{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:14px}
.sum-hdr{background:linear-gradient(135deg,#0d1520,#0a1018);border-bottom:1px solid var(--bdr);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.sum-title{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.08em;color:var(--grn)}
.sum-date{font-family:'IBM Plex Mono',monospace;font-size:.53rem;color:var(--m2)}
.sum-body{padding:12px 14px}
.sum-verdict{background:var(--s2);border-left:3px solid var(--grn);border-radius:0 6px 6px 0;padding:10px 12px;margin-bottom:10px;font-size:.78rem;line-height:1.6}
.sum-verdict.bear{border-color:var(--red)}.sum-verdict.mix{border-color:var(--yel)}
.sum-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.ss{background:var(--s2);border:1px solid var(--bdr);border-radius:6px;padding:8px 6px;text-align:center}
.ss-n{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;line-height:1}
.ss-l{font-family:'IBM Plex Mono',monospace;font-size:.48rem;color:var(--m2);text-transform:uppercase;margin-top:2px}
.nav-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.nav-chip{font-family:'Bebas Neue',sans-serif;font-size:.85rem;padding:4px 10px;border-radius:5px;cursor:pointer;border:1px solid;transition:all .2s}
.nc-g{background:rgba(13,255,140,.08);color:var(--grn);border-color:rgba(13,255,140,.3)}
.nc-y{background:rgba(255,204,0,.08);color:var(--yel);border-color:rgba(255,204,0,.3)}
.nc-r{background:rgba(255,61,90,.08);color:var(--red);border-color:rgba(255,61,90,.3)}
.stit{font-family:'IBM Plex Mono',monospace;font-size:.54rem;color:var(--m2);letter-spacing:.1em;text-transform:uppercase;margin:14px 0 10px;display:flex;align-items:center;gap:8px}
.stit::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;animation:fi .3s ease both}
.card.call{border-color:rgba(13,255,140,.25)}.card.put{border-color:rgba(255,61,90,.25)}.card.dim{opacity:.45}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.15}}

/* DECISION BANNER - MOST PROMINENT */
.decision{padding:14px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.dec-left{display:flex;align-items:center;gap:10px}
.dec-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dec-text{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em}
.dec-g{background:rgba(13,255,140,.12)}.dec-g .dec-dot{background:var(--grn);box-shadow:0 0 8px var(--grn)}.dec-g .dec-text{color:var(--grn)}
.dec-y{background:rgba(255,204,0,.08)}.dec-y .dec-dot{background:var(--yel)}.dec-y .dec-text{color:var(--yel)}
.dec-r{background:rgba(255,61,90,.07)}.dec-r .dec-dot{background:var(--red)}.dec-r .dec-text{color:var(--red)}
.dec-score{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1;flex-shrink:0}

/* OPTION SUGGESTION - SECOND MOST PROMINENT */
.opt-box{margin:0;padding:14px 16px;border-bottom:1px solid var(--bdr);background:var(--s2)}
.opt-label{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:var(--m2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.opt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.opt-item{background:var(--bg);border:1px solid var(--bdr);border-radius:6px;padding:8px 10px;text-align:center}
.opt-item-lbl{font-family:'IBM Plex Mono',monospace;font-size:.48rem;color:var(--m1);text-transform:uppercase;margin-bottom:4px}
.opt-item-val{font-size:.9rem;font-weight:700}
.opt-why{margin-top:8px;font-size:.72rem;color:var(--m2);line-height:1.5;font-style:italic}

/* TICKER HEADER */
.tk-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bdr)}
.tk-sym{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;line-height:1}
.card.call .tk-sym{color:var(--grn)}.card.put .tk-sym{color:var(--red)}
.tk-type{font-family:'IBM Plex Mono',monospace;font-size:.52rem;font-weight:700;padding:2px 7px;border-radius:3px}
.call .tk-type{background:rgba(13,255,140,.12);color:var(--grn)}.put .tk-type{background:rgba(255,61,90,.12);color:var(--red)}
.tk-price{font-size:.9rem;font-weight:700;color:var(--blu)}
.tk-chg{font-size:.8rem;font-weight:600}
.tk-right{margin-left:auto;text-align:right}
.tk-sector{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:var(--m2)}

/* SCORE BARS */
.sbars{padding:5px 0;background:var(--s2);border-bottom:1px solid var(--bdr)}
.sbar{display:flex;align-items:center;gap:8px;padding:3px 14px}
.sbar-lbl{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--m2);min-width:110px}
.sbar-bg{flex:1;height:4px;background:var(--bdr);border-radius:4px;overflow:hidden}
.sbar-fill{height:100%;border-radius:4px}
.sbar-val{font-family:'IBM Plex Mono',monospace;font-size:.52rem;font-weight:700;min-width:24px;text-align:right}
.sbar-bd{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--m2);padding:3px 14px 6px;border-bottom:1px solid var(--bdr)}

/* DATA SECTIONS */
.sec{border-bottom:1px solid var(--bdr)}
.sec-title{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:var(--yel);letter-spacing:.1em;text-transform:uppercase;padding:7px 14px 4px;background:var(--s2)}
.dg{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bdr)}
@media(max-width:420px){.dg{grid-template-columns:repeat(2,1fr)}}
.dc{background:var(--s1);padding:8px 10px}
.dc.full{grid-column:1/-1}
.dl{font-family:'IBM Plex Mono',monospace;font-size:.48rem;color:var(--m1);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.dv{font-size:.78rem;font-weight:600}
.dv.g{color:var(--grn)}.dv.r{color:var(--red)}.dv.y{color:var(--yel)}.dv.b{color:var(--blu)}
.dv.sm{font-size:.68rem}

/* NEWS */
.news-sec{padding:10px 14px;border-top:1px solid var(--bdr)}
.news-lbl{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--m2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.news-item{font-size:.7rem;padding:4px 0;border-bottom:1px solid var(--bdr);line-height:1.4}
.news-item:last-child{border-bottom:none}
.news-item a{color:var(--blu);text-decoration:none}
.news-item a:hover{color:var(--grn)}

/* RISK/ANALYSIS */
.analysis{padding:10px 14px;background:var(--s1)}
.an-row{margin-bottom:8px}.an-row:last-child{margin-bottom:0}
.an-lbl{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--m2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.an-txt{font-size:.73rem;line-height:1.6;color:#8a93ad}

/* EXPORT */
.exp-btn{display:block;width:100%;margin-top:18px;margin-bottom:8px;padding:13px;background:rgba(255,204,0,.07);color:var(--yel);border:2px solid rgba(255,204,0,.4);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;cursor:pointer;transition:all .2s;text-align:center}
.exp-btn:hover{background:rgba(255,204,0,.13);border-color:var(--yel)}
.disc{margin-top:8px;padding:10px 12px;background:var(--s1);border:1px solid var(--bdr);border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:.53rem;color:var(--m1);line-height:1.7}
.disc b{color:var(--yel)}
</style>
</head>
<body>
<div class="w">

<!-- HEADER -->
<div class="hdr">
  <div>
    <div class="logo">FLOW<span class="g">SCAN</span> <span class="y">9</span></div>
    <div class="logo-s">UNUSUAL OPTIONS · YAHOO · FINVIZ · IBKR</div>
  </div>
  <div class="hdr-r">
    <span class="sdot" id="sdot"></span><span id="sstat">Conectando...</span><br>
    Capital: <b id="cap-disp">$500-$1,500</b> · IBKR
  </div>
</div>

<!-- MARKET PULSE -->
<div class="pulse" id="pulse">
  <div class="pulse-hdr">
    <div class="pulse-title" id="pulse-title">PULSO DEL MERCADO</div>
    <div class="pulse-vix" id="pulse-vix">VIX: — · Riesgo: —</div>
  </div>
  <div class="pulse-grid" id="pulse-grid"></div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" id="tab-scan" onclick="showTab('scan',this)">
    🔍 SCAN AUTONOMO
    <span class="tab-sub">Unusual Whales + Yahoo + Finviz</span>
  </button>
  <button class="tab" id="tab-alert" onclick="showTab('alert',this)">
    ⚡ MIS ALERTAS
    <span class="tab-sub">Pega alertas de tu grupo</span>
  </button>
</div>

<!-- SCAN PANEL -->
<div class="panel active" id="panel-scan">
  <div class="box">
    <div class="pt">Configuracion</div>
    <div class="row">
      <div class="fi"><label>Capital min ($)</label><input type="number" id="cmin" value="500" oninput="updateCap()"></div>
      <div class="fi"><label>Capital max ($)</label><input type="number" id="cmax" value="1500" oninput="updateCap()"></div>
      <div class="fi">
        <label>Mercado hoy</label>
        <select id="mkt">
          <option value="bullish">Alcista 📈</option>
          <option value="bearish">Bajista 📉</option>
          <option value="neutral" selected>Neutral / Mixto</option>
          <option value="volatile">Muy volatil ⚡</option>
        </select>
      </div>
    </div>
    <button class="btn-scan" id="btn-scan" onclick="runScan()">🔍 ESCANEAR FLUJO INUSUAL EN TIEMPO REAL</button>
  </div>
</div>

<!-- ALERT PANEL -->
<div class="panel" id="panel-alert">
  <div class="box">
    <div class="pt">Pega alertas o tickers</div>
    <textarea id="inp" placeholder="Alertas de tu grupo (una por linea):
INTC 125 calls julio ASK side $241K premium
GE 825 mil calls vencen 18 junio strike 330

Solo tickers:
AMD, NVDA, INTC, USAR

Comentario con >>:
ADBE 530 mil calls ene 2027 strike 300
>> ADBE anuncio buyback $25B esta semana"></textarea>
    <div class="row" style="margin-top:10px">
      <div class="fi"><label>Capital min ($)</label><input type="number" id="cmin2" value="500"></div>
      <div class="fi"><label>Capital max ($)</label><input type="number" id="cmax2" value="1500"></div>
      <div class="fi">
        <label>Mercado</label>
        <select id="mkt2">
          <option value="bullish">Alcista 📈</option>
          <option value="bearish">Bajista 📉</option>
          <option value="neutral" selected>Neutral / Mixto</option>
          <option value="volatile">Muy volatil ⚡</option>
        </select>
      </div>
    </div>
    <button class="btn-alert" id="btn-alert" onclick="runAlerts()">⚡ ANALIZAR MIS ALERTAS</button>
  </div>
</div>

<div class="er" id="er"></div>
<div class="pg" id="pg">
  <div class="pg-top"><div class="pg-lbl" id="pg-lbl">Iniciando...</div></div>
  <div class="pg-bg"><div class="pg-fill" id="pg-fill"></div></div>
  <div class="pg-sub" id="pg-sub"></div>
</div>
<div id="res"></div>
</div>

<script>
var BASE = 'https://flow-mac.onrender.com';
var results = [];
var busy = false;
var ALL_TK = ['NVDA','AMD','TSLA','AAPL','META','MSFT','GOOGL','AMZN','SPY','QQQ','MRVL','SMCI','PLTR','CRWD','RBLX','HOOD','GE','BA','COIN','USAR','INTC','IBM','NFLX','DIS','PYPL'];

window.onload = function() {
  checkHealth();
  fetchPulse();
};

function updateCap() {
  document.getElementById('cap-disp').textContent = '$'+(document.getElementById('cmin').value||500)+'-$'+(document.getElementById('cmax').value||1500);
}

function checkHealth() {
  fetch(BASE+'/api/health')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok){
        document.getElementById('sdot').className='sdot live';
        document.getElementById('sstat').textContent='Live · Yahoo+Finviz+UW';
        document.getElementById('sstat').style.color='var(--grn)';
      }
    })
    .catch(function(){
      document.getElementById('sstat').textContent='Offline — espera 30s';
      document.getElementById('sstat').style.color='var(--red)';
    });
}

function fetchPulse() {
  fetch(BASE+'/api/pulse')
    .then(function(r){return r.json();})
    .then(function(d){
      window._market = d;
      renderPulse(d);
    })
    .catch(function(){});
}

function renderPulse(d) {
  if(!d||!d.sentiment) return;
  var pulse = document.getElementById('pulse');
  pulse.className = 'pulse on';
  var sc = d.sentiment;
  var bc = sc==='ALCISTA'?'var(--grn)':sc==='BAJISTA'?'var(--red)':'var(--yel)';
  var em = d.emoji||'➡️';
  document.getElementById('pulse-title').textContent = em+' MERCADO HOY: '+sc;
  document.getElementById('pulse-title').style.color = bc;
  document.getElementById('pulse-vix').textContent = 'VIX: '+(d.vix_price||'—').toFixed(2)+' · Riesgo: '+(d.vix_risk||'—');

  var syms = ['SPY','QQQ','IWM','VIX'];
  var grid = document.getElementById('pulse-grid');
  grid.innerHTML = syms.map(function(s){
    var data = d[s]||{};
    var chg = parseFloat(data.change_pct||0);
    var cc = chg>0?'var(--grn)':chg<0?'var(--red)':'var(--m2)';
    var ps = s==='VIX'?parseFloat(d.vix_price||0).toFixed(2):'$'+parseFloat(data.price||0).toFixed(2);
    return '<div class="pulse-cell"><div class="pulse-lbl">'+s+'</div><div class="pulse-val">'+ps+'</div><div class="pulse-chg" style="color:'+cc+'">'+(chg>=0?'+':'')+chg.toFixed(2)+'%</div></div>';
  }).join('');
}

function showTab(name, btn) {
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('res').className='';
  document.getElementById('res').innerHTML='';
  document.getElementById('er').className='er';
}

function setOff(on){
  document.getElementById('btn-scan').disabled=on;
  document.getElementById('btn-alert').disabled=on;
}
function showErr(msg){var e=document.getElementById('er');e.textContent=msg;e.className='er on';setOff(false);busy=false;}
function prog(pct,lbl,sub){
  document.getElementById('pg-fill').style.width=pct+'%';
  document.getElementById('pg-lbl').textContent=lbl;
  document.getElementById('pg-sub').textContent=sub||'';
}

/* ── SCAN ── */
function runScan(){
  if(busy)return;
  busy=true;results=[];setOff(true);
  document.getElementById('er').className='er';
  document.getElementById('res').className='on';
  document.getElementById('res').innerHTML='';
  document.getElementById('pg').className='pg on';
  prog(10,'Consultando Unusual Whales...','Buscando flujo inusual de opciones...');

  var mkt=document.getElementById('mkt').value;
  fetch(BASE+'/api/scan')
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){
      prog(100,'Listo',(d.items||[]).length+' tickers analizados');
      document.getElementById('pg').className='pg';
      results=d.items||[];
      if(d.market) { window._market=d.market; renderPulse(d.market); }
      renderAll(results,d.summary,d.source);
    })
    .catch(function(e){
      document.getElementById('pg').className='pg';
      document.getElementById('res').innerHTML='';
      showErr('Error: '+e.message+'. El servidor puede tardar 30-50s en despertar. Intenta de nuevo.');
    })
    .finally(function(){busy=false;setOff(false);});
}

/* ── ALERTS ── */
function runAlerts(){
  if(busy)return;
  var raw=(document.getElementById('inp').value||'').trim();
  if(!raw){showErr('Escribe al menos un ticker o alerta.');return;}
  var items=parseAlerts(raw);
  if(!items.length){showErr('No encontre tickers. Usa mayusculas: AAPL, TSLA...');return;}

  var cmin=document.getElementById('cmin2').value||'500';
  var cmax=document.getElementById('cmax2').value||'1500';
  var mkt=document.getElementById('mkt2').value;

  busy=true;results=[];setOff(true);
  document.getElementById('er').className='er';
  document.getElementById('res').className='on';
  document.getElementById('res').innerHTML='';
  document.getElementById('pg').className='pg on';
  prog(0,'Analizando '+items.length+' alertas...','Consultando Yahoo Finance + Finviz...');

  var cards=document.createElement('div');cards.className='cards';cards.id='cards-live';
  document.getElementById('res').appendChild(cards);
  items.forEach(function(it,i){
    var sk=makeSk(i,'Analizando <b>'+it.ticker+'</b>...');
    cards.appendChild(sk);
  });

  var done=0;
  items.forEach(function(it,i){
    setTimeout(function(){
      fetch(BASE+'/api/analyze',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({tickers:it.ticker,alert_raw:it.raw,comment:it.comment||'',market:mkt})
      })
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(d){
        if(d.market){window._market=d.market;renderPulse(d.market);}
        var arr=d.items||[];
        if(arr.length){
          arr[0]._comment=it.comment||'';
          results.push(arr[0]);
          var card=buildCard(arr[0],i);
          var sk=document.getElementById('sk'+i);
          if(sk)sk.replaceWith(card);
        }
      })
      .catch(function(e){
        var sk=document.getElementById('sk'+i);
        if(sk)sk.innerHTML='<div style="padding:10px 14px;font-family:\'IBM Plex Mono\',monospace;font-size:.62rem;color:var(--red)">✗ '+it.ticker+' — '+e.message+'</div>';
      })
      .finally(function(){
        done++;
        prog(Math.round(done/items.length*100),done+'/'+items.length+' completados',done>=items.length?'Generando resumen...':'Analizando...');
        if(done>=items.length) finishAlerts();
      });
    },i*600);
  });
}

function finishAlerts(){
  var cd=document.getElementById('cards-live');
  if(cd){
    var els=Array.from(cd.querySelectorAll('.card'));
    els.sort(function(a,b){return parseFloat(b.dataset.score||0)-parseFloat(a.dataset.score||0);});
    els.forEach(function(c,i){c.style.animationDelay=(i*.05)+'s';cd.appendChild(c);});
  }
  if(results.length){
    document.getElementById('res').insertBefore(buildSummary(results,'⚡ Mis Alertas — '+results.length+' analizadas'),document.getElementById('res').firstChild);
    addFooter(document.getElementById('res'));
  }
  document.getElementById('pg').className='pg';
  setOff(false);busy=false;
  document.getElementById('res').scrollIntoView({behavior:'smooth',block:'start'});
}

function parseAlerts(raw){
  var out=[],seen={};
  raw.replace(/\r/g,'').split('\n').forEach(function(line){
    line=line.trim();if(!line)return;
    if(line.startsWith('>>')||line.startsWith('//')){
      var n=line.replace(/^(>>|\/\/)+\s*/,'').trim();
      if(n&&out.length)out[out.length-1].comment=(out[out.length-1].comment?out[out.length-1].comment+' | ':'')+n;
      return;
    }
    if(/^[A-Za-z]{1,6}(\s*,\s*[A-Za-z]{1,6})+/.test(line)){
      line.split(',').forEach(function(t){var tk=t.trim().toUpperCase().match(/^([A-Z]{1,6})/);if(tk&&!seen[tk[1]]){seen[tk[1]]=1;out.push({ticker:tk[1],raw:t.trim(),simple:true,comment:''});}});return;
    }
    var m=line.match(/\b([A-Z]{1,6})\b/);
    if(m&&!seen[m[1]]){seen[m[1]]=1;out.push({ticker:m[1],raw:line,simple:/^[A-Z]{1,6}$/.test(line),comment:''});}
  });
  return out;
}

function makeSk(i,txt){
  var sk=document.createElement('div');
  sk.id='sk'+i;
  sk.style.cssText='background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:14px;display:flex;gap:10px;align-items:center';
  sk.innerHTML='<div style="width:8px;height:8px;border-radius:50%;background:var(--grn);animation:bk 1s ease infinite;flex-shrink:0"></div><div style="font-family:\'IBM Plex Mono\',monospace;font-size:.62rem;color:var(--m2)">'+txt+'</div>';
  return sk;
}

/* ── RENDER ALL ── */
function renderAll(items,summary,source){
  var res=document.getElementById('res');
  res.innerHTML='';
  if(!items||!items.length){
    res.innerHTML='<div style="background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:20px;text-align:center;font-family:\'IBM Plex Mono\',monospace;font-size:.75rem;color:var(--m2)">Sin datos disponibles. Prueba en horario de mercado 8:30 AM - 3:00 PM hora de Mexico.</div>';
    return;
  }
  if(summary){
    var si=document.createElement('div');
    si.style.cssText='background:var(--s1);border:1px solid rgba(13,255,140,.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:.75rem;line-height:1.6;border-left:3px solid var(--grn);color:var(--txt)';
    var badge=source&&source.includes('unusual')?'<span style="font-family:\'IBM Plex Mono\',monospace;font-size:.52rem;background:rgba(13,255,140,.1);color:var(--grn);padding:2px 7px;border-radius:4px;margin-left:6px">UNUSUAL WHALES</span>':'<span style="font-family:\'IBM Plex Mono\',monospace;font-size:.52rem;background:rgba(255,204,0,.1);color:var(--yel);padding:2px 7px;border-radius:4px;margin-left:6px">YAHOO+FINVIZ</span>';

/* ── BUILD SUMMARY ── */
function buildSummary(rs,title){
  var g=rs.filter(function(r){return r.semaforo==='VERDE';}).length;
  var y=rs.filter(function(r){return r.semaforo==='AMARILLO';}).length;
  var rd=rs.length-g-y;
  var s=rs.slice().sort(function(a,b){return(b.score||0)-(a.score||0);});
  var bias=g>rd?'ALCISTA':rd>g?'BAJISTA':'MIXTO';
  var bc=bias==='ALCISTA'?'var(--grn)':bias==='BAJISTA'?'var(--red)':'var(--yel)';
  var vc=bias==='BAJISTA'?'bear':bias==='MIXTO'?'mix':'';
  var verdict=rd===rs.length?'Sin setups claros hoy. Esperar mejores condiciones.'
    :'De '+rs.length+' analizados: '+(g?'<b style="color:var(--grn)">'+g+' ENTRAR</b>':'')+( y?(g?', ':'')+y+' esperar':'')+(rd?' y '+rd+' evitar':'')+'. '+(s[0]?'Mejor: <b style="color:'+(s[0].direction==='CALL'?'var(--grn)':'var(--red)')+'">'+s[0].ticker+'</b> '+s[0].score+'/10.':'');
  var now=new Date();
  var ds=now.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})+' · '+now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  var chips=s.map(function(t){
    var cls=t.semaforo==='VERDE'?'nc-g':t.semaforo==='AMARILLO'?'nc-y':'nc-r';
    return '<span class="nav-chip '+cls+'" onclick="var el=document.getElementById(\'card-'+t.ticker+'\');if(el)el.scrollIntoView({behavior:\'smooth\',block:\'center\'})">'+t.ticker+' '+t.score+'</span>';
  }).join('');
  var el=document.createElement('div');
  el.innerHTML='<div class="sumbox"><div class="sum-hdr"><div class="sum-title">'+title+'</div><div class="sum-date">'+ds+'</div></div><div class="sum-body"><div class="sum-verdict '+vc+'">'+verdict+'</div><div class="sum-stats"><div class="ss"><div class="ss-n" style="color:'+bc+'">'+rs.length+'</div><div class="ss-l">Total</div></div><div class="ss"><div class="ss-n" style="color:var(--grn)">'+g+'</div><div class="ss-l">🟢 Entrar</div></div><div class="ss"><div class="ss-n" style="color:var(--yel)">'+y+'</div><div class="ss-l">🟡 Esperar</div></div><div class="ss"><div class="ss-n" style="color:var(--red)">'+rd+'</div><div class="ss-l">🔴 Evitar</div></div></div><div class="nav-chips">'+chips+'</div></div></div><div class="stit">Detalle — mejor a peor</div>';
  return el;
}

/* ── BUILD CARD ── */
function c(v){return (v+'').startsWith('+')?'g':'r';}
function sb(lbl,pts,max){
  var p=parseFloat(pts)||0,pct=Math.round(p/max*100);
  var col=pct>=75?'var(--grn)':pct>=40?'var(--yel)':'var(--red)';
  return'<div class="sbar"><span class="sbar-lbl">'+lbl+'</span><div class="sbar-bg"><div class="sbar-fill" style="width:'+pct+'%;background:'+col+'"></div></div><span class="sbar-val" style="color:'+col+'">'+p.toFixed(1)+'</span></div>';
}

function buildCard(d,idx){
  var type=(d.direction||d.type||'CALL').toUpperCase();
  var call=type==='CALL';
  var sc=parseFloat(d.score)||0;
  var decCls=sc>=7?'dec-g':sc>=4?'dec-y':'dec-r';
  var decTxt=sc>=7?'✅ ENTRAR — espera la zona':sc>=4?'⏳ ESPERAR — aguarda confirmacion':'❌ NO OPERAR — no reune criterios';
  var scCol=sc>=7?'var(--grn)':sc>=4?'var(--yel)':'var(--red)';
  var price=parseFloat(d.spot||0);
  var chgPct=d.change_pct||'+0.00%';
  var chgCol=(chgPct+'').includes('+')?'var(--grn)':'var(--red)';
  var relVol=parseFloat(d.rel_volume||1);
  var rvCol=relVol>=2?'g':relVol>=1.5?'y':'r';
  var rsiVal=parseFloat(d.rsi_value||50);
  var rsiCol=rsiVal>=70?'r':rsiVal<=30?'b':'g';
  var momCol=d.momentum&&d.momentum.includes('ALCISTA')?'g':d.momentum&&d.momentum.includes('BAJISTA')?'r':'y';
  var sfPct=parseFloat(d.short_pct||0);
  var sfCol=sfPct>=20?'r':sfPct>=10?'y':'g';
  var perfWCol=d.perf_week&&(d.perf_week+'').startsWith('+')?'g':'r';
  var perfMCol=d.perf_month&&(d.perf_month+'').startsWith('+')?'g':'r';

  // Option suggestion
  var strike=d.strike||0;
  var optBox='';
  if(sc>=4&&strike){
    optBox='<div class="opt-box">'
      +'<div class="opt-label">🎯 Opcion sugerida — verificar cadena en IBKR</div>'
      +'<div class="opt-grid">'
        +'<div class="opt-item"><div class="opt-item-lbl">Tipo</div><div class="opt-item-val" style="color:'+(call?'var(--grn)':'var(--red)')+'">'+type+'</div></div>'
        +'<div class="opt-item"><div class="opt-item-lbl">Strike sugerido</div><div class="opt-item-val" style="color:var(--yel)">$'+parseFloat(strike).toFixed(0)+'</div></div>'
        +'<div class="opt-item"><div class="opt-item-lbl">Stop / Target 1</div><div class="opt-item-val" style="font-size:.75rem">'+(d.stop||'N/A')+' / '+(d.target_1||'N/A')+'</div></div>'
        +'<div class="opt-item"><div class="opt-item-lbl">Zona entrada</div><div class="opt-item-val" style="font-size:.72rem;color:var(--yel)">'+(d.ez||'N/A')+'</div></div>'
        +'<div class="opt-item"><div class="opt-item-lbl">VWAP hoy</div><div class="opt-item-val" style="color:var(--blu)">'+(d.vwap||'N/A')+'</div></div>'
        +'<div class="opt-item"><div class="opt-item-lbl">ATR (riesgo)</div><div class="opt-item-val">'+(d.atr||'N/A')+'</div></div>'
      +'</div>'
      +(d.why?'<div class="opt-why">💡 '+d.why+'</div>':'')
    +'</div>';
  }

  // News
  var newsArr=d.news||[];
  var newsH=newsArr.length?'<div class="news-sec"><div class="news-lbl">📰 Noticias recientes</div>'+newsArr.slice(0,4).map(function(n){return'<div class="news-item"><a href="'+n.url+'" target="_blank">'+n.title+'</a></div>';}).join('')+'</div>':'';

  // Comment

  var card=document.createElement('div');
  card.className='card '+(call?'call':'put')+(sc<4?' dim':'');
  card.dataset.score=sc;
  card.id='card-'+d.ticker;
  card.style.animationDelay=(idx*.05)+'s';

  card.innerHTML=
    // 1. DECISION — más prominente
    '<div class="decision '+decCls+'">'
      +'<div class="dec-left"><div class="dec-dot"></div><div class="dec-text">'+decTxt+'</div></div>'
      +'<div class="dec-score" style="color:'+scCol+'">'+sc+'/10</div>'
    +'</div>'

    // 2. TICKER HEADER
    +'<div class="tk-hdr">'
      +'<span class="tk-sym">'+d.ticker+'</span>'
      +'<span class="tk-type">'+type+'</span>'
      +'<span class="tk-price">'+( price?'$'+price.toFixed(2):'—')+'</span>'

    +'</div>'

      +sb('Momentum tecnico',d.pts_momentum,2.0)

      +'<div class="dc"><div class="dl">Recomendacion</div><div class="dv y">'+(d.recommendation||'N/A')+'</div></div>'

      +'<div class="dc"><div class="dl">Perf Mes</div><div class="dv '+perfMCol+'">'+(d.perf_month||'N/A')+'</div></div>'
      +'<div class="dc"><div class="dl">Perf YTD</div><div class="dv '+c(d.perf_ytd)+'">'+(d.perf_ytd||'N/A')+'</div></div>'
      +'<div class="dc"><div class="dl">52W Alto</div><div class="dv">'+(d.high_52w||'N/A')+'</div></div>'
      +'<div class="dc"><div class="dl">52W Bajo</div><div class="dv">'+(d.low_52w||'N/A')+'</div></div>'

      +'<div class="an-row"><div class="an-lbl">⚠ Riesgo / Invalidacion</div><div class="an-txt">'+(d.risk||'N/A')+'</div></div>'

  return card;
}

  var btn=document.createElement('button');btn.className='exp-btn';btn.innerHTML='📄 EXPORTAR A PDF';btn.onclick=exportPDF;container.appendChild(btn);
  var disc=document.createElement('div');disc.className='disc';disc.innerHTML='<b>⚠ AVISO:</b> Analisis educativo. Datos Yahoo Finance (~15min delay). No es asesoria financiera. Las opciones implican riesgo de perdida total. Verifica siempre en IBKR antes de operar.';container.appendChild(disc);
}

    var call=(d.direction||'CALL')==='CALL';

    var at=d.semaforo==='VERDE'?'ENTRAR':d.semaforo==='AMARILLO'?'ESPERAR':'NO OPERAR';
    return'<div style="border:1px solid #ccc;border-radius:6px;margin-bottom:12px;overflow:hidden;page-break-inside:avoid">'
      +'<div style="padding:8px 12px;background:'+(call?'#e8fff5':'#fff0f2')+';border-bottom:2px solid '+(call?'#00c46a':'#e53935')+';display:flex;justify-content:space-between;align-items:center">'
        +'<div><b style="font-size:16px;color:'+(call?'#00873d':'#c62828')+'">'+d.ticker+'</b> '+d.type+' · Strike $'+(d.strike||'N/A')+' · '+(d.ez||'')+'<br>'
          +'<span style="font-size:9px;padding:2px 6px;border-radius:3px;background:'+(sc>=7?'#d4edda':sc>=4?'#fff3cd':'#f8d7da')+';color:'+(sc>=7?'#155724':sc>=4?'#856404':'#721c24')+'">'+at+'</span>'
        +'</div>'
        +'<b style="font-size:22px;color:'+(sc>=7?'#00873d':sc>=4?'#e65100':'#c62828')+'">'+sc+'/10</b>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);font-size:10px;border-top:1px solid #eee">'
        +'<div style="padding:5px 8px;border-right:1px solid #eee"><div style="color:#888;font-size:8px">PRECIO</div>'+(d.spot?'$'+parseFloat(d.spot).toFixed(2):'N/A')+'</div>'
        +'<div style="padding:5px 8px;border-right:1px solid #eee"><div style="color:#888;font-size:8px">CAMBIO</div>'+(d.change_pct||'N/A')+'</div>'
        +'<div style="padding:5px 8px"><div style="color:#888;font-size:8px">VOL REL</div>'+(d.vol_vs_avg||'N/A')+'</div>'
        +'<div style="padding:5px 8px;border-right:1px solid #eee"><div style="color:#888;font-size:8px">RSI</div>'+(d.rsi||'N/A')+'</div>'
        +'<div style="padding:5px 8px;border-right:1px solid #eee"><div style="color:#888;font-size:8px">MA50</div>'+(d.ma50_pct||'N/A')+'</div>'
        +'<div style="padding:5px 8px"><div style="color:#888;font-size:8px">PT ANALISTAS</div>'+(d.target_price||'N/A')+'</div>'
      +'</div>'
      +'<div style="padding:8px 12px;font-size:10px;border-top:1px solid #eee"><b>Analisis:</b> '+(d.why||'N/A')+'<br><b>Riesgo:</b> '+(d.risk||'N/A')+'</div>'
    +'</div>';
  }).join('');
  w.document.write('<!DOCTYPE html><html><head><title>FlowScan 9</title></head><body style="font-family:Arial,sans-serif;padding:20px;font-size:11px"><h2>FLOWSCAN 9 — '+new Date().toLocaleString('es-MX')+'</h2>'+rows+'<p style="font-size:8px;color:#999;margin-top:16px">No es asesoria financiera. Verificar en IBKR.</p><script>window.print();</scr'+'ipt></body></html>');
  w.document.close();
}
</script>
